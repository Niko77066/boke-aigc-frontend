server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Same-origin reverse proxy for CapCut archive APIs to avoid browser CORS failures.
    location /api/capcut/ {
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_pass https://dddadmin-stg.koxagent.com;
        proxy_set_header Host dddadmin-stg.koxagent.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header x-api-key $http_x_api_key;
    }

    # Same-origin reverse proxy for FastGPT pipeline SSE/workflow requests.
    location /api/pipeline/ {
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_pass https://ai.blue-converse.com/api/;
        proxy_set_header Host ai.blue-converse.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization "${PIPELINE_AUTHORIZATION}";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        add_header X-Accel-Buffering no;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # health check
    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
