name: Build And Deploy To Sealos

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
    paths:
      - '.github/workflows/sealos-cd.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'docker-entrypoint.d/**'
      - 'env.d.ts'
      - 'index.html'
      - 'nginx.conf'
      - 'package.json'
      - 'package-lock.json'
      - 'public/**'
      - 'src/**'
      - 'tsconfig*.json'
      - 'vite.config.ts'
  workflow_dispatch:

concurrency:
  group: sealos-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Production build
        run: npm run build-only

  build:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    outputs:
      app_name: ${{ steps.meta.outputs.app_name }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      namespace: ${{ steps.meta.outputs.namespace }}
      host: ${{ steps.meta.outputs.host }}
      api_base_url: ${{ steps.meta.outputs.api_base_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare metadata
        id: meta
        env:
          RAW_APP_NAME: ${{ vars.SEALOS_APP_NAME }}
          RAW_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
          RAW_HOST: ${{ vars.SEALOS_HOST }}
          RAW_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          repo_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          app_name="${RAW_APP_NAME:-${GITHUB_REPOSITORY##*/}}"
          namespace="${RAW_NAMESPACE:-default}"
          host="${RAW_HOST:-}"
          api_base_url="${RAW_API_BASE_URL:-}"
          sha_tag="sha-${GITHUB_SHA::12}"
          image_ref="${REGISTRY}/${repo_lc}:${sha_tag}"

          {
            echo "app_name=${app_name}"
            echo "namespace=${namespace}"
            echo "host=${host}"
            echo "api_base_url=${api_base_url}"
            echo "image_ref=${image_ref}"
            echo "tags<<EOF"
            echo "${image_ref}"
            if [ "${REF_NAME}" = "main" ] || [ "${REF_NAME}" = "master" ]; then
              echo "${REGISTRY}/${repo_lc}:latest"
            fi
            if [ "${REF_TYPE}" = "tag" ]; then
              echo "${REGISTRY}/${repo_lc}:${REF_NAME}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
    permissions:
      contents: read
    env:
      APP_NAME: ${{ needs.build.outputs.app_name }}
      IMAGE_REF: ${{ needs.build.outputs.image_ref }}
      NAMESPACE: ${{ needs.build.outputs.namespace }}
      HOST: ${{ needs.build.outputs.host }}
      API_BASE_URL: ${{ needs.build.outputs.api_base_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy prerequisites
        id: deploy_check
        env:
          SEALOS_KUBECONFIG: ${{ secrets.SEALOS_KUBECONFIG }}
        run: |
          if [ -n "${SEALOS_KUBECONFIG}" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "SEALOS_KUBECONFIG is not configured; skipping deploy job."
          fi

      - name: Set up kubectl
        if: steps.deploy_check.outputs.enabled == 'true'
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        if: steps.deploy_check.outputs.enabled == 'true'
        env:
          SEALOS_KUBECONFIG: ${{ secrets.SEALOS_KUBECONFIG }}
        run: |
          mkdir -p "${HOME}/.kube"
          printf '%s' "${SEALOS_KUBECONFIG}" > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"

      - name: Render manifests
        if: steps.deploy_check.outputs.enabled == 'true'
        run: echo "Updating existing Sealos deployment ${APP_NAME} in namespace ${NAMESPACE}"

      - name: Apply manifests
        if: steps.deploy_check.outputs.enabled == 'true'
        run: |
          if ! kubectl get namespace "${NAMESPACE}" >/dev/null 2>&1; then
            echo "Namespace ${NAMESPACE} does not exist."
            exit 1
          fi

          if ! kubectl get deployment "${APP_NAME}" -n "${NAMESPACE}" >/dev/null 2>&1; then
            echo "Deployment ${APP_NAME} does not exist in namespace ${NAMESPACE}."
            exit 1
          fi

          kubectl set image deployment/"${APP_NAME}" "${APP_NAME}"="${IMAGE_REF}" -n "${NAMESPACE}"
          kubectl set env deployment/"${APP_NAME}" VITE_API_BASE_URL="${API_BASE_URL}" -n "${NAMESPACE}"
          kubectl annotate deployment/"${APP_NAME}" originImageName="${IMAGE_REF}" -n "${NAMESPACE}" --overwrite
          kubectl rollout status deployment/"${APP_NAME}" -n "${NAMESPACE}" --timeout=180s
