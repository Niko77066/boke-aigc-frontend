name: Build And Deploy To Sealos

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: sealos-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.meta.outputs.app_name }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      namespace: ${{ steps.meta.outputs.namespace }}
      host: ${{ steps.meta.outputs.host }}
      api_base_url: ${{ steps.meta.outputs.api_base_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare metadata
        id: meta
        env:
          RAW_APP_NAME: ${{ vars.SEALOS_APP_NAME }}
          RAW_NAMESPACE: ${{ vars.SEALOS_NAMESPACE }}
          RAW_HOST: ${{ vars.SEALOS_HOST }}
          RAW_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          repo_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          app_name="${RAW_APP_NAME:-${GITHUB_REPOSITORY##*/}}"
          namespace="${RAW_NAMESPACE:-default}"
          host="${RAW_HOST:-}"
          api_base_url="${RAW_API_BASE_URL:-}"
          sha_tag="sha-${GITHUB_SHA::12}"
          image_ref="${REGISTRY}/${repo_lc}:${sha_tag}"

          {
            echo "app_name=${app_name}"
            echo "namespace=${namespace}"
            echo "host=${host}"
            echo "api_base_url=${api_base_url}"
            echo "image_ref=${image_ref}"
            echo "tags<<EOF"
            echo "${image_ref}"
            if [ "${REF_NAME}" = "main" ] || [ "${REF_NAME}" = "master" ]; then
              echo "${REGISTRY}/${repo_lc}:latest"
            fi
            if [ "${REF_TYPE}" = "tag" ]; then
              echo "${REGISTRY}/${repo_lc}:${REF_NAME}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      APP_NAME: ${{ needs.build.outputs.app_name }}
      IMAGE_REF: ${{ needs.build.outputs.image_ref }}
      NAMESPACE: ${{ needs.build.outputs.namespace }}
      HOST: ${{ needs.build.outputs.host }}
      API_BASE_URL: ${{ needs.build.outputs.api_base_url }}
      SEALOS_KUBECONFIG: ${{ secrets.SEALOS_KUBECONFIG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy prerequisites
        id: deploy_check
        run: |
          if [ -n "${SEALOS_KUBECONFIG}" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "SEALOS_KUBECONFIG is not configured; skipping deploy job."
          fi

      - name: Set up kubectl
        if: steps.deploy_check.outputs.enabled == 'true'
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        if: steps.deploy_check.outputs.enabled == 'true'
        run: |
          mkdir -p "${HOME}/.kube"
          printf '%s' "${SEALOS_KUBECONFIG}" > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"

      - name: Render manifests
        if: steps.deploy_check.outputs.enabled == 'true'
        run: |
          mkdir -p .rendered
          export APP_NAME IMAGE_REF NAMESPACE HOST API_BASE_URL
          for tpl in deploy/sealos/deployment.yaml.tpl deploy/sealos/service.yaml.tpl; do
            out=".rendered/$(basename "${tpl%.tpl}")"
            perl -pe 's/\$\{(\w+)\}/defined $ENV{$1} ? $ENV{$1} : q()/ge' "${tpl}" > "${out}"
          done

          if [ -n "${HOST}" ]; then
            perl -pe 's/\$\{(\w+)\}/defined $ENV{$1} ? $ENV{$1} : q()/ge' deploy/sealos/ingress.yaml.tpl > .rendered/ingress.yaml
          fi

      - name: Apply manifests
        if: steps.deploy_check.outputs.enabled == 'true'
        run: |
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f .rendered/deployment.yaml
          kubectl apply -f .rendered/service.yaml
          if [ -f .rendered/ingress.yaml ]; then
            kubectl apply -f .rendered/ingress.yaml
          fi
          kubectl rollout status deployment/"${APP_NAME}" -n "${NAMESPACE}" --timeout=180s
